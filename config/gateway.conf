#=========================================================
# Smart Meter Communication Gateway Configuration
#=========================================================

# Gateway Information
GATEWAY_NAME=Smart Meter Gateway
GATEWAY_ID=GW001
LOCATION=Substation_A

# Server Configuration
SERVER_IP=127.0.0.1
SERVER_PORT=5000

# Meter Configuration
METER_COUNT=5
POLL_INTERVAL_MS=1000

# Logging
LOG_LEVEL=INFO
LOG_FILE=logs/gateway.log

# Network
CONNECT_TIMEOUT_SEC=5
RETRY_COUNT=3

# Thread Configuration
WORKER_THREADS=2

# Daemon
RUN_AS_DAEMON=NO
PID_FILE=/tmp/gateway.pid
